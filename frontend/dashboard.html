<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Bank - Dashboard</title>
    <meta name="description"
        content="Nexus Bank Dashboard - A modern, secure, and beautiful banking interface for managing your finances, transfers, and accounts.">
    <!-- Updated CSS path -->
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-building-columns"></i>
                <span>NexusBank</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-money-bill-transfer"></i> Transactions</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-credit-card"></i> Cards</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
            <div class="user-profile">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <div class="user-info">
                    <span class="name">John Doe</span>
                    <span class="role">Premium User</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1>Welcome back, John! 👋</h1>
                <div class="header-actions">
                    <button class="icon-btn" aria-label="Notifications"><i class="fa-solid fa-bell"></i></button>
                    <button class="icon-btn" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
                    <!-- Make logout button functional via id -->
                    <button class="icon-btn" id="logout-btn" aria-label="Logout"><i
                            class="fa-solid fa-arrow-right-from-bracket"></i></button>
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- Balance Card -->
                <section class="card balance-card">
                    <h2 class="card-header">Total Balance</h2>
                    <div class="balance-amount" id="total-balance">$0.00</div>
                    <div class="balance-stats">
                        <span class="positive"><i class="fa-solid fa-arrow-up"></i> 2.5%</span> than last month
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-primary" onclick="document.getElementById('transfer-amount').focus()"><i
                                class="fa-solid fa-paper-plane"></i> Send</button>
                        <button class="btn btn-secondary"><i class="fa-solid fa-plus"></i> Top Up</button>
                    </div>
                </section>

                <!-- Quick Transfer -->
                <section class="card quick-transfer">
                    <h2>Quick Transfer</h2>
                    <div class="transfer-form">
                        <div class="input-group">
                            <label for="transfer-amount">Amount</label>
                            <input type="number" id="transfer-amount" placeholder="0.00" min="1" step="0.01">
                        </div>
                        <div class="input-group">
                            <label for="recipient-account">Recipient Account</label>
                            <input type="text" id="recipient-account" placeholder="Enter account number or email">
                        </div>
                        <button class="btn btn-primary full-width" id="btn-transfer">Transfer Now</button>
                        <div id="transfer-message" class="message" role="alert"></div>
                    </div>
                </section>

                <!-- Recent Transactions -->
                <section class="card transactions-card span-2">
                    <div class="card-header-flex">
                        <h2>Recent Transactions</h2>
                        <a href="#" class="view-all">View All</a>
                    </div>
                    <ul class="transaction-list" id="transaction-list">
                        <!-- Transactions will be populated by JS -->
                    </ul>
                </section>
            </div>
        </main>
    </div>

    <!-- Updated JS paths -->
    <script src="js/account.js"></script>
    <script src="js/transaction.js"></script>
</body>

</html>
